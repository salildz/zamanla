# ─── zamanla-dev.yildizsalih.com ─────────────────────────────────────────────
#
# Development environment with Vite hot reload.
#
# Deploy:
#   sudo cp /home/salih/projects/zamanla/nginx/zamanla-dev.conf \
#            /etc/nginx/sites-available/zamanla-dev
#   sudo ln -s /etc/nginx/sites-available/zamanla-dev \
#              /etc/nginx/sites-enabled/zamanla-dev
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

server {
    listen 80;
    server_name zamanla-dev.yildizsalih.com;

    # ── API backend ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9051/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Cloudflare-specific headers — forward real visitor info to backend
        proxy_set_header   CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_set_header   CF-Ray             $http_cf_ray;
        proxy_set_header   CF-Visitor         $http_cf_visitor;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Vite dev server (with WebSocket/HMR support) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:9050;
        proxy_http_version 1.1;

        # Required for Vite HMR WebSocket upgrade
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_set_header   CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_set_header   CF-Ray             $http_cf_ray;
        proxy_set_header   CF-Visitor         $http_cf_visitor;

        # Allow long-lived connections for HMR
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
