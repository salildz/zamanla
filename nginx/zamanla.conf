# ─── zamanla.yildizsalih.com (production) ────────────────────────────────────
#
# Serves pre-built frontend from /var/www/zamanla/dist.
# Proxies /api/ to the backend running in Docker on port 9051.
#
# Deploy:
#   sudo cp /home/salih/projects/zamanla/nginx/zamanla.conf \
#            /etc/nginx/sites-available/zamanla
#   sudo ln -s /etc/nginx/sites-available/zamanla \
#              /etc/nginx/sites-enabled/zamanla
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires:
#   - /var/www/zamanla/dist/ populated (run scripts/deploy-prod.sh)
#   - docker compose -f docker-compose.prod.yml up -d

server {
    listen 80;
    server_name zamanla.yildizsalih.com;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-XSS-Protection         "1; mode=block"                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── API backend ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9051/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Cloudflare-specific headers
        proxy_set_header   CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_set_header   CF-Ray             $http_cf_ray;
        proxy_set_header   CF-Visitor         $http_cf_visitor;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Prevent nginx from buffering large responses (streaming)
        proxy_buffering    off;
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    root  /var/www/zamanla/dist;
    index index.html;

    # Vite produces content-hashed filenames under /assets/ — cache aggressively
    location /assets/ {
        expires         1y;
        add_header      Cache-Control "public, immutable";
        access_log      off;
    }

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
