services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zamanla}
      POSTGRES_USER: ${DB_USER:-zamanla}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zamanla_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "9052:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zamanla} -d ${DB_NAME:-zamanla}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 9051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-zamanla}
      DB_USER: ${DB_USER:-zamanla}
      DB_PASSWORD: ${DB_PASSWORD:-zamanla_dev_password}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:9050}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    ports:
      - "9051:9051"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:9051/api}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    ports:
      - "9050:80"
    depends_on:
      - server

volumes:
  postgres_data:
